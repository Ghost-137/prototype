name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers the action every time you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Dependencies
        run: npm ci

      - name: Build and Export Static Site
        run: npm run build

      # This stops GitHub from blocking folders starting with underscores like _next/
      - name: Add .nojekyll file to stop Jekyll asset blocking
        run: touch ./out/.nojekyll

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4